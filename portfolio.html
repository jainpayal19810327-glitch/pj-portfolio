<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PJ — Graphic Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05050a;
  --gold: #d4a853;
  --gold2: #f0c878;
  --cream: #f0ece0;
  --muted: #5a5650;
  --card: #0c0c14;
  --border: rgba(212,168,83,0.12);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--cream);
  overflow-x: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed;
  width: 10px; height: 10px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transition: transform 0.1s ease, width 0.35s ease, height 0.35s ease, background 0.35s;
  transform: translate(-50%, -50%);
}

#cursor-ring {
  position: fixed;
  width: 40px; height: 40px;
  border: 1px solid rgba(212,168,83,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.45s cubic-bezier(0.22,1,0.36,1), height 0.45s cubic-bezier(0.22,1,0.36,1), border-color 0.35s;
}

body.hovering #cursor { width: 6px; height: 6px; background: var(--gold2); }
body.hovering #cursor-ring { width: 60px; height: 60px; border-color: rgba(212,168,83,0.8); }
body.clicking #cursor { transform: translate(-50%,-50%) scale(0.6); }

/* ── LOADER ── */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 24px;
  transition: opacity 0.8s ease, visibility 0.8s;
}

#loader.gone { opacity: 0; visibility: hidden; }

.loader-name {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 4px;
  overflow: hidden;
}

.loader-bar-track {
  width: 200px; height: 1px;
  background: rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

.loader-bar-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0%;
  background: var(--gold);
  transition: width 1.4s cubic-bezier(0.22,1,0.36,1);
}

.loader-pct {
  font-size: .72rem;
  letter-spacing: 3px;
  color: var(--muted);
}

/* ── CANVAS ── */
#star-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── NAV ── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 500;
  padding: 0 5%;
  mix-blend-mode: normal;
}

nav {
  height: 72px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 2px;
}

.nav-links { display: flex; gap: 36px; align-items: center; }

.nav-links a {
  text-decoration: none;
  color: var(--muted);
  font-size: .72rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  transition: color .3s;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0;
  height: 1px;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .35s cubic-bezier(0.22,1,0.36,1);
}

.nav-links a:hover { color: var(--cream); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-hire {
  padding: 9px 22px;
  border: 1px solid var(--gold);
  border-radius: 3px;
  color: var(--gold) !important;
  font-size: .72rem !important;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all .3s !important;
}

.nav-hire::after { display: none !important; }
.nav-hire:hover { background: var(--gold) !important; color: #05050a !important; }

.hamburger { display:none; font-size:20px; cursor:none; color:var(--cream); background:none; border:none; }

/* ── SECTIONS ── */
section { position: relative; z-index: 1; }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 0 5%;
  padding-top: 72px;
  overflow: hidden;
}

.hero-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  width: 100%;
  min-height: calc(100vh - 72px);
  align-items: stretch;
}

.hero-left {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px 0;
  padding-right: 80px;
}

.hero-kicker {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp .8s .8s forwards;
}

.kicker-dot {
  width: 7px; height: 7px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(212,168,83,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(212,168,83,0); }
}

.kicker-text {
  font-size: .7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(3.8rem, 7vw, 7.5rem);
  line-height: 0.95;
  font-weight: 700;
  margin-bottom: 36px;
  overflow: hidden;
}

.title-line {
  display: block;
  opacity: 0;
  transform: translateY(110%);
  animation: slideUp .9s cubic-bezier(0.22,1,0.36,1) forwards;
}

.title-line:nth-child(1) { animation-delay: 1s; }
.title-line:nth-child(2) { animation-delay: 1.15s; color: var(--gold); font-style: italic; }
.title-line:nth-child(3) { animation-delay: 1.3s; -webkit-text-stroke: 1px rgba(240,236,224,0.2); color: transparent; }

.hero-desc {
  color: var(--muted);
  font-size: .95rem;
  line-height: 1.9;
  max-width: 400px;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp .8s 1.5s forwards;
}

.hero-ctas {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  opacity: 0;
  animation: fadeUp .8s 1.7s forwards;
}

.cta-main {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 36px;
  background: var(--gold);
  color: #05050a;
  text-decoration: none;
  font-size: .78rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  border-radius: 3px;
  transition: all .4s;
  overflow: hidden;
  position: relative;
}

.cta-main::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold2);
  transform: translateX(-100%);
  transition: transform .4s cubic-bezier(0.22,1,0.36,1);
}

.cta-main:hover::before { transform: translateX(0); }
.cta-main span, .cta-main svg { position: relative; z-index: 1; }
.cta-main:hover { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(212,168,83,0.25); }

.cta-ghost {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 18px 28px;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--muted);
  text-decoration: none;
  font-size: .78rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 3px;
  transition: all .35s;
}

.cta-ghost:hover { border-color: rgba(212,168,83,0.4); color: var(--cream); }

/* ── HERO RIGHT ── */
.hero-right {
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 1.2s 0.5s forwards;
}

.hero-right-inner {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #0d0c10, #14120c);
  overflow: hidden;
}

.hr-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
}

.hr-glow-1 {
  width: 400px; height: 400px;
  background: rgba(212,168,83,0.12);
  top: -100px; right: -100px;
}

.hr-glow-2 {
  width: 300px; height: 300px;
  background: rgba(100,80,180,0.06);
  bottom: -80px; left: -60px;
}

.hr-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(212,168,83,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,83,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
}

.hr-floating-cards {
  position: absolute;
  inset: 0;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.hr-top-row { display: flex; justify-content: space-between; align-items: flex-start; }
.hr-bottom-row { display: flex; justify-content: space-between; align-items: flex-end; }

.hr-badge {
  background: rgba(12,12,20,0.85);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  backdrop-filter: blur(12px);
  animation: floatA 4s ease-in-out infinite;
}

.hr-badge:nth-child(2) { animation: floatB 5s 0.5s ease-in-out infinite; }

@keyframes floatA {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes floatB {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}

.badge-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.badge-label {
  font-size: .65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 4px;
}

.hr-center-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.hr-center-text .big {
  font-family: 'Playfair Display', serif;
  font-size: 6rem;
  font-weight: 900;
  font-style: italic;
  color: transparent;
  -webkit-text-stroke: 1px rgba(212,168,83,0.15);
  line-height: 1;
  user-select: none;
}

.hr-orb {
  position: absolute;
  width: 160px; height: 160px;
  border-radius: 50%;
  border: 1px solid rgba(212,168,83,0.1);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: spinOrb 12s linear infinite;
}

.hr-orb::after {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  background: var(--gold);
  border-radius: 50%;
  top: -4px; left: 50%;
  transform: translateX(-50%);
}

@keyframes spinOrb {
  from { transform: translate(-50%,-50%) rotate(0deg); }
  to { transform: translate(-50%,-50%) rotate(360deg); }
}

.hr-orb-2 {
  width: 240px; height: 240px;
  animation-duration: 20s;
  animation-direction: reverse;
}

.hr-orb-3 {
  width: 320px; height: 320px;
  animation-duration: 30s;
  border-color: rgba(212,168,83,0.05);
}

.hr-available {
  position: absolute;
  bottom: 40px;
  right: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 18px;
  background: rgba(12,20,12,0.85);
  border: 1px solid rgba(100,200,100,0.2);
  border-radius: 50px;
  font-size: .68rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(120,200,100,0.8);
  backdrop-filter: blur(12px);
}

.avail-dot {
  width: 6px; height: 6px;
  background: rgba(100,220,80,0.9);
  border-radius: 50%;
  animation: pulse2 2s infinite;
  flex-shrink: 0;
}

@keyframes pulse2 {
  0%, 100% { box-shadow: 0 0 0 0 rgba(100,220,80,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(100,220,80,0); }
}

/* ── SCROLL INDICATOR ── */
.scroll-hint {
  position: absolute;
  bottom: 40px; left: 5%;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  animation: fadeUp .8s 2.2s forwards;
}

.scroll-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(180deg, transparent, var(--gold), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}

@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.scroll-text {
  font-size: .62rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  writing-mode: vertical-rl;
}

/* ── MARQUEE ── */
.marquee-section {
  padding: 28px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  position: relative;
  z-index: 1;
  background: rgba(212,168,83,0.025);
}

.marquee-track {
  display: flex;
  gap: 56px;
  width: max-content;
  animation: marqueeScroll 20s linear infinite;
}

@keyframes marqueeScroll {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.marquee-item {
  font-size: .68rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(212,168,83,0.35);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 14px;
}

.marquee-item::before { content: '◆'; font-size: .35rem; color: var(--gold); opacity: 0.5; }

/* ── SERVICES ── */
#services {
  padding: 130px 5%;
  background: linear-gradient(180deg, var(--bg) 0%, #080810 100%);
}

.services-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 80px;
  flex-wrap: wrap;
  gap: 32px;
}

.section-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}

.section-eyebrow span {
  font-size: .65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
}

.eyebrow-rule {
  width: 36px;
  height: 1px;
  background: var(--gold);
  opacity: 0.4;
}

.section-h {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 4.5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.05;
}

.section-h em { font-style: italic; color: var(--gold); }

.services-right-note {
  max-width: 280px;
  color: var(--muted);
  font-size: .88rem;
  line-height: 1.8;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.svc-card {
  background: var(--card);
  padding: 48px 36px;
  position: relative;
  overflow: hidden;
  transition: background .4s;
}

.svc-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(212,168,83,0.05), transparent);
  opacity: 0;
  transition: opacity .4s;
}

.svc-card:hover { background: #10101c; }
.svc-card:hover::before { opacity: 1; }

.svc-icon {
  width: 48px; height: 48px;
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  margin-bottom: 28px;
  transition: border-color .4s, transform .4s;
}

.svc-card:hover .svc-icon {
  border-color: rgba(212,168,83,0.4);
  transform: scale(1.08) rotate(-3deg);
}

.svc-num-label {
  font-size: .62rem;
  letter-spacing: 2px;
  color: var(--gold);
  opacity: 0.5;
  margin-bottom: 12px;
}

.svc-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.35rem;
  font-weight: 400;
  margin-bottom: 12px;
}

.svc-card p { color: var(--muted); font-size: .86rem; line-height: 1.7; }

.svc-arrow-wrap {
  position: absolute;
  bottom: 28px; right: 28px;
  width: 32px; height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-size: .9rem;
  transition: all .4s;
  transform: rotate(0deg);
}

.svc-card:hover .svc-arrow-wrap {
  color: var(--gold);
  transform: rotate(45deg) translateX(2px) translateY(-2px);
}

/* ── PORTFOLIO ── */
#portfolio {
  padding: 130px 5%;
  background: var(--card);
}

.portfolio-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 64px;
  flex-wrap: wrap;
  gap: 24px;
}

.see-all {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--muted);
  font-size: .75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color .3s;
}

.see-all:hover { color: var(--gold); }

.see-all svg { transition: transform .35s; }
.see-all:hover svg { transform: translateX(5px); }

/* Bento grid */
.bento {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-template-rows: auto;
  gap: 16px;
}

.bento-item {
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--bg);
  transition: transform .4s cubic-bezier(0.22,1,0.36,1), border-color .4s;
  position: relative;
  cursor: none;
}

.bento-item:hover {
  transform: translateY(-8px);
  border-color: rgba(212,168,83,0.25);
}

.bi-1 { grid-column: 1 / 8; }
.bi-2 { grid-column: 8 / 13; }
.bi-3 { grid-column: 1 / 5; }
.bi-4 { grid-column: 5 / 9; }
.bi-5 { grid-column: 9 / 13; }

.bento-visual {
  height: 260px;
  position: relative;
  overflow: hidden;
}

.bi-1 .bento-visual { height: 340px; }

.bv-bg {
  position: absolute;
  inset: 0;
  transition: transform .6s cubic-bezier(0.22,1,0.36,1);
}

.bento-item:hover .bv-bg { transform: scale(1.05); }

.bv-a { background: linear-gradient(135deg, #0e0a06 0%, #1c1408 50%, #0a0e14 100%); }
.bv-b { background: linear-gradient(135deg, #080e14 0%, #0a1420 100%); }
.bv-c { background: linear-gradient(135deg, #0a0e0a 0%, #101810 100%); }
.bv-d { background: linear-gradient(135deg, #10080e 0%, #1a0c16 100%); }
.bv-e { background: linear-gradient(135deg, #0e0e08 0%, #1a1a0a 100%); }

.bv-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.18;
  transition: opacity .4s;
}

.bento-item:hover .bv-glow { opacity: 0.3; }

.bv-a .bv-glow { width:200px;height:200px;background:#d4a853;top:-50px;right:-30px; }
.bv-b .bv-glow { width:160px;height:160px;background:#5390d9;top:30px;left:20px; }
.bv-c .bv-glow { width:150px;height:150px;background:#53d97a;bottom:-20px;right:20px; }
.bv-d .bv-glow { width:150px;height:150px;background:#d953a0;top:20px;right:20px; }
.bv-e .bv-glow { width:130px;height:130px;background:#d4a853;bottom:20px;left:20px; }

.bv-shape {
  position: absolute;
  border: 1px solid rgba(255,255,255,0.06);
  transition: transform .6s cubic-bezier(0.22,1,0.36,1);
}

.bento-item:hover .bv-shape { transform: rotate(15deg) scale(1.1); }

.bv-a .bv-shape { width:140px;height:140px;bottom:30px;left:40px;border-radius:20px;transform:rotate(8deg); }
.bv-b .bv-shape { width:80px;height:80px;bottom:40px;right:40px;border-radius:50%; }
.bv-c .bv-shape { width:80px;height:80px;top:40px;left:36px; }
.bv-d .bv-shape { width:70px;height:70px;top:36px;left:36px;border-radius:50%;transform:scale(1.3); }
.bv-e .bv-shape { width:90px;height:90px;top:36px;right:30px;transform:rotate(-12deg); }

.bv-tag {
  position: absolute;
  top: 20px; right: 20px;
  padding: 6px 14px;
  background: rgba(5,5,10,0.8);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-size: .62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  backdrop-filter: blur(10px);
}

.bento-info { padding: 24px 28px; }

.bento-info .tag {
  font-size: .62rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
  margin-bottom: 8px;
}

.bento-info h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 400;
  margin-bottom: 6px;
}
